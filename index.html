<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3T Galileo</title>

<!-- PWA / Safari home screen -->

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="3T Galileo" />
<meta name="theme-color" content="#0c0c10" />
<link rel="apple-touch-icon" id="appIcon" />

<!-- Genera l'icona 180×180 via canvas al caricamento -->

<script>
(function() {
  const SIZE = 180;
  const c = document.createElement("canvas");
  c.width = c.height = SIZE;
  const ctx = c.getContext("2d");

  // — Sfondo: gradiente viola → rosa —
  const grad = ctx.createLinearGradient(0, 0, SIZE, SIZE);
  grad.addColorStop(0, "#4f2fff");
  grad.addColorStop(1, "#fc5c7d");
  ctx.fillStyle = grad;
  // Angoli arrotondati (r=36)
  const r = 36;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(SIZE - r, 0);
  ctx.quadraticCurveTo(SIZE, 0, SIZE, r);
  ctx.lineTo(SIZE, SIZE - r);
  ctx.quadraticCurveTo(SIZE, SIZE, SIZE - r, SIZE);
  ctx.lineTo(r, SIZE);
  ctx.quadraticCurveTo(0, SIZE, 0, SIZE - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // — Emoji fotocamera piccola in alto —
  ctx.font = "44px serif";
  ctx.textAlign = "center";
  ctx.fillText("📷", SIZE / 2, 72);

  // — Testo "3T" grande e bold —
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 68px -apple-system, Arial, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("3T", SIZE / 2, 128);

  // Assegna come apple-touch-icon
  document.getElementById("appIcon").href = c.toDataURL("image/png");
})();
</script>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080810;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.08);
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --text: #ffffff;
    --muted: #a0a0c8;
    --radius: 18px;
  }

html { background: #080810; }

body {
/* background-color esplicito + background-image separato: fix per Safari */
background-color: #080810;
background-image:
radial-gradient(ellipse 70% 50% at 0% 0%,    rgba(124,92,252,0.28) 0%, transparent 55%),
radial-gradient(ellipse 50% 40% at 100% 100%, rgba(252,92,125,0.22) 0%, transparent 55%),
radial-gradient(ellipse 40% 30% at 50% 50%,   rgba(80,40,180,0.12) 0%, transparent 70%);
background-attachment: fixed;
color: var(–text);
font-family: ‘Inter’, sans-serif;
min-height: 100vh;
padding-bottom: 80px;
}

/* ── HEADER ── */
.header {
display: flex; align-items: center; justify-content: space-between;
padding: 18px 28px;
background: rgba(8,8,16,0.80);
backdrop-filter: blur(20px);
border-bottom: 1px solid rgba(124,92,252,0.25);
/* Lineetta colorata sotto */
box-shadow: 0 1px 0 0 rgba(124,92,252,0.15), 0 4px 24px rgba(0,0,0,0.4);
position: sticky; top: 0; z-index: 100;
}
.logo {
font-family: ‘Syne’, sans-serif; font-size: 1.55rem; font-weight: 800; letter-spacing: -0.5px;
background: linear-gradient(100deg, #c4b5fd 0%, #a78bfa 40%, #fc5c7d 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
filter: drop-shadow(0 0 18px rgba(167,139,250,0.4));
}
.header-right { display: flex; align-items: center; gap: 10px; }
.pill {
background: rgba(124,92,252,0.15);
border: 1px solid rgba(124,92,252,0.35);
color: #c4b5fd;
padding: 5px 14px; border-radius: 99px; font-size: 0.78rem; font-weight: 700;
display: none; letter-spacing: 0.3px;
}
.pill strong { color: #fff; }

/* ── UPLOAD SECTION ── */
.upload-section { max-width: 720px; margin: 36px auto 0; padding: 0 20px; }

.section-label {
display: flex; align-items: center; gap: 8px;
font-size: 0.65rem; font-weight: 700; letter-spacing: 2.5px;
text-transform: uppercase; color: #a0a0c8; margin-bottom: 14px;
}
.section-label::before {
content: ‘’;
display: inline-block; width: 20px; height: 2px;
background: linear-gradient(90deg, var(–accent), var(–accent2));
border-radius: 2px;
}

/* Card con bordo gradiente */
.upload-card {
position: relative;
border-radius: var(–radius);
overflow: hidden;
background: var(–surface);
/* Bordo gradiente via pseudo-element */
box-shadow:
0 0 0 1px rgba(124,92,252,0.3),
0 8px 32px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.05);
}

.caption-row {
display: flex; align-items: center; gap: 12px;
padding: 16px 20px;
border-bottom: 1px solid rgba(124,92,252,0.15);
background: rgba(124,92,252,0.04);
}
.caption-avatar {
width: 38px; height: 38px; border-radius: 50%;
background: linear-gradient(135deg, #6d40ff, #fc5c7d);
flex-shrink: 0; display: flex; align-items: center; justify-content: center;
font-size: 1.1rem;
box-shadow: 0 0 0 3px rgba(124,92,252,0.2), 0 4px 12px rgba(124,92,252,0.3);
}
#captionInput {
flex: 1; background: transparent; border: none; outline: none;
font-family: ‘Inter’, sans-serif; font-size: 0.95rem; color: #ffffff;
caret-color: #7c5cfc;
}
#captionInput::placeholder { color: rgba(160,160,200,0.8); }

.dropzone {
position: relative; display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 12px;
padding: 44px 24px; cursor: pointer; transition: background 0.25s;
/* Bordo tratteggiato colorato */
margin: 16px;
border-radius: 12px;
border: 1.5px dashed rgba(124,92,252,0.35);
background: rgba(124,92,252,0.03);
}
.dropzone:hover, .dropzone.drag {
background: rgba(124,92,252,0.08);
border-color: rgba(124,92,252,0.6);
}
.dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

.dz-icon {
width: 60px; height: 60px; border-radius: 18px;
background: linear-gradient(135deg, rgba(124,92,252,0.2), rgba(252,92,125,0.15));
border: 1px solid rgba(124,92,252,0.3);
display: flex; align-items: center; justify-content: center;
font-size: 1.8rem; transition: transform 0.2s;
pointer-events: none;
box-shadow: 0 4px 16px rgba(124,92,252,0.2);
}
.dropzone:hover .dz-icon, .dropzone.drag .dz-icon { transform: scale(1.1) rotate(-4deg); }

.dz-label { font-size: 1rem; font-weight: 700; color: #ffffff; pointer-events: none; }
.dz-sub { font-size: 0.8rem; color: #a0a0c8; pointer-events: none; }

.dz-btn {
margin-top: 4px;
background: linear-gradient(135deg, #7c5cfc, #a855f7);
color: #ffffff; border: none; padding: 10px 26px; border-radius: 12px;
font-family: ‘Inter’, sans-serif; font-weight: 700; font-size: 0.88rem;
pointer-events: none;
box-shadow: 0 4px 20px rgba(124,92,252,0.45);
letter-spacing: 0.2px;
}

/* Riga fotocamera dedicata iOS */
.camera-row {
display: flex; align-items: center; justify-content: center; gap: 12px;
padding: 14px 20px 18px;
border-top: 1px solid rgba(255,255,255,0.06);
}
.camera-label { font-size: 0.78rem; color: #a0a0c8; font-style: italic; }
.camera-btn {
background: rgba(252,92,125,0.15);
border: 1px solid rgba(252,92,125,0.4);
color: #ffb0c0;
padding: 10px 22px; border-radius: 12px;
font-family: ‘Inter’, sans-serif; font-weight: 700; font-size: 0.88rem;
cursor: pointer; transition: all 0.15s;
letter-spacing: 0.2px;
}
.camera-btn:hover, .camera-btn:active {
background: rgba(252,92,125,0.28);
border-color: rgba(252,92,125,0.7);
box-shadow: 0 4px 16px rgba(252,92,125,0.3);
}

/* ── PROGRESS ── */
.progress-wrap { max-width: 720px; margin: 14px auto 0; padding: 0 20px; display: none; }
.progress-card {
background: var(–surface);
border: 1px solid rgba(124,92,252,0.25);
border-radius: 14px; padding: 14px 18px;
box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.progress-label { font-size: 0.8rem; color: var(–muted); margin-bottom: 10px; display: flex; justify-content: space-between; }
.progress-track { height: 5px; background: var(–surface2); border-radius: 5px; overflow: hidden; }
.progress-fill {
height: 100%; width: 0%;
background: linear-gradient(90deg, var(–accent), var(–accent2));
border-radius: 5px; transition: width 0.25s;
box-shadow: 0 0 8px rgba(124,92,252,0.5);
}

/* ── GALLERY ── */
.gallery-section { max-width: 720px; margin: 40px auto; padding: 0 20px; }
.gallery-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.gallery-header-right { display: flex; gap: 10px; align-items: center; }

.btn-zip {
display: inline-flex; align-items: center; gap: 7px;
background: rgba(124,92,252,0.12);
border: 1px solid rgba(124,92,252,0.35);
color: #c4b5fd;
padding: 8px 18px; border-radius: 10px; font-family: ‘Inter’, sans-serif;
font-weight: 700; font-size: 0.82rem; cursor: pointer;
transition: all 0.15s;
}
.btn-zip:hover {
background: rgba(124,92,252,0.22);
border-color: rgba(124,92,252,0.6);
box-shadow: 0 0 16px rgba(124,92,252,0.25);
}
.btn-zip:disabled { opacity: 0.35; cursor: not-allowed; }

.view-toggle {
display: flex;
background: var(–surface2);
border: 1px solid rgba(255,255,255,0.08);
border-radius: 10px; overflow: hidden;
}
.vt-btn { padding: 7px 14px; background: transparent; border: none; color: var(–muted); cursor: pointer; font-size: 0.88rem; transition: all 0.15s; }
.vt-btn.active { background: rgba(124,92,252,0.25); color: #c4b5fd; }

/* ── FEED ── */
#feed { display: flex; flex-direction: column; gap: 16px; }
#feed.hidden { display: none; }

.post-card {
background: var(–surface);
border: 1px solid rgba(255,255,255,0.07);
border-radius: var(–radius); overflow: hidden;
transition: border-color 0.2s, box-shadow 0.2s;
box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.post-card:hover {
border-color: rgba(124,92,252,0.4);
box-shadow: 0 8px 32px rgba(124,92,252,0.12);
}
/* Lineetta colorata in cima ad ogni post */
.post-card::before {
content: ‘’;
display: block;
height: 2px;
background: linear-gradient(90deg, var(–accent), var(–accent2));
opacity: 0;
transition: opacity 0.2s;
}
.post-card:hover::before { opacity: 1; }

.post-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; }
.post-meta { display: flex; align-items: center; gap: 12px; }
.post-avatar {
width: 38px; height: 38px; border-radius: 50%;
background: linear-gradient(135deg, #7c5cfc, #fc5c7d);
display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0;
box-shadow: 0 0 0 2px rgba(124,92,252,0.3);
}
.post-caption { font-size: 0.92rem; font-weight: 600; color: #ffffff; line-height: 1.35; }
.post-time {
font-size: 0.7rem; color: #a0a0c8; margin-top: 3px;
display: flex; align-items: center; gap: 4px;
}
.post-time::before { content: ‘🕐’; font-size: 0.65rem; }
.post-actions { display: flex; gap: 6px; }
.icon-btn {
background: var(–surface2); border: 1px solid rgba(255,255,255,0.07); border-radius: 9px;
width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
}
.icon-btn:hover { background: rgba(124,92,252,0.2); border-color: rgba(124,92,252,0.5); transform: scale(1.08); }
.icon-btn.del:hover { background: rgba(252,92,125,0.2); border-color: rgba(252,92,125,0.5); }

.post-img { width: 100%; display: block; max-height: 520px; object-fit: cover; cursor: zoom-in; }
.post-filename {
padding: 10px 18px; font-size: 0.72rem; color: #a0a0c8;
border-top: 1px solid rgba(255,255,255,0.05);
background: rgba(0,0,0,0.15);
display: flex; align-items: center; gap: 6px;
}
.post-filename::before { content: ‘📎’; font-size: 0.7rem; }

/* ── GRID ── */
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
#grid.hidden { display: none; }
.grid-card {
aspect-ratio: 1; border-radius: 14px; overflow: hidden; position: relative;
cursor: zoom-in; background: var(–surface);
border: 1px solid rgba(255,255,255,0.07);
transition: transform 0.2s, box-shadow 0.2s;
}
.grid-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(124,92,252,0.2); }
.grid-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s; }
.grid-card:hover img { transform: scale(1.06); }
.grid-overlay {
position: absolute; inset: 0;
background: linear-gradient(to top, rgba(10,5,30,0.85) 0%, transparent 55%);
opacity: 0; transition: opacity 0.25s;
display: flex; align-items: flex-end; padding: 12px; pointer-events: none;
}
.grid-card:hover .grid-overlay { opacity: 1; }
.grid-caption { font-size: 0.76rem; font-weight: 600; color: #fff; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
.grid-btns { position: absolute; top: 8px; right: 8px; display: flex; gap: 5px; opacity: 0; transition: opacity 0.2s; }
.grid-card:hover .grid-btns { opacity: 1; }
.mini-btn {
width: 30px; height: 30px; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
display: flex; align-items: center; justify-content: center;
font-size: 0.78rem; cursor: pointer; color: #fff; transition: background 0.15s;
}
.mini-btn:hover { background: rgba(124,92,252,0.75); border-color: rgba(124,92,252,0.5); }
.mini-btn.del:hover { background: rgba(252,92,125,0.75); border-color: rgba(252,92,125,0.5); }

/* ── EMPTY / LOADING ── */
.empty { text-align: center; padding: 80px 20px; }
.empty-icon { font-size: 4rem; margin-bottom: 16px; filter: drop-shadow(0 0 20px rgba(124,92,252,0.3)); }
.empty-title { font-family: ‘Syne’, sans-serif; font-size: 1.2rem; color: #c0c0e0; }
.empty-sub { font-size: 0.85rem; color: #a0a0c8; margin-top: 6px; }
#loadingState {
text-align: center; padding: 80px 20px; color: #a0a0c8; font-size: 0.9rem;
display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.spinner-ring {
width: 36px; height: 36px;
border: 3px solid rgba(124,92,252,0.15);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── LIGHTBOX ── */
#lightbox {
display: none; position: fixed; inset: 0; background: rgba(4,4,12,0.95); z-index: 300;
align-items: center; justify-content: center; flex-direction: column;
padding: 24px; backdrop-filter: blur(16px);
}
#lightbox.open { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
#lbImg { max-width: 94vw; max-height: 80vh; border-radius: 14px; object-fit: contain; box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.07); }
#lbCaption { margin-top: 18px; color: rgba(200,200,255,0.65); font-size: 0.9rem; max-width: 500px; text-align: center; font-style: italic; }
#lbClose {
position: fixed; top: 18px; right: 22px;
background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
color: #fff; font-size: 1.1rem; border-radius: 10px;
width: 40px; height: 40px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
backdrop-filter: blur(8px); transition: background 0.15s;
}
#lbClose:hover { background: rgba(252,92,125,0.3); border-color: rgba(252,92,125,0.5); }

/* ── TOAST ── */
#toast {
display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
background: rgba(20,20,32,0.95);
border: 1px solid rgba(124,92,252,0.4);
color: var(–text); padding: 12px 24px; border-radius: 14px;
font-size: 0.88rem; font-weight: 600; z-index: 500;
backdrop-filter: blur(16px); box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,92,252,0.1);
white-space: nowrap; animation: toastIn 0.22s ease;
}
@keyframes toastIn {
from { opacity: 0; transform: translateX(-50%) translateY(10px); }
to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
/* ── PREVIEW CARD ── */
.preview-card {
background: #111118;
border-radius: 18px;
overflow: hidden;
box-shadow: 0 0 0 1px rgba(124,92,252,0.35), 0 8px 32px rgba(0,0,0,0.4);
}

.preview-thumbs {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
gap: 3px;
max-height: 320px;
overflow: hidden;
}

.preview-thumb {
aspect-ratio: 1;
object-fit: cover;
display: block;
width: 100%;
background: #1a1a24;
}

/* Se c’è solo 1 foto, mostrala grande */
.preview-thumbs.single .preview-thumb {
grid-column: 1 / -1;
max-height: 300px;
aspect-ratio: unset;
object-fit: contain;
background: #0c0c14;
}

.preview-caption-row {
display: flex; align-items: center; gap: 12px;
padding: 14px 18px;
border-top: 1px solid rgba(255,255,255,0.06);
background: rgba(124,92,252,0.04);
}

.preview-caption-input {
flex: 1; background: transparent; border: none; outline: none;
font-family: ‘Inter’, sans-serif; font-size: 0.95rem;
color: #ffffff; caret-color: #7c5cfc;
}
.preview-caption-input::placeholder { color: rgba(160,160,200,0.7); }

.preview-actions {
display: flex; gap: 10px; padding: 14px 18px;
border-top: 1px solid rgba(255,255,255,0.06);
}

.btn-cancel {
flex: 1; background: rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.1); color: #a0a0c8;
padding: 12px; border-radius: 12px;
font-family: ‘Inter’, sans-serif; font-weight: 700; font-size: 0.9rem;
cursor: pointer; transition: all 0.15s;
}
.btn-cancel:hover { background: rgba(255,255,255,0.1); }

.btn-publish {
flex: 2; background: linear-gradient(135deg, #7c5cfc, #fc5c7d);
border: none; color: #ffffff;
padding: 12px; border-radius: 12px;
font-family: ‘Inter’, sans-serif; font-weight: 700; font-size: 0.95rem;
cursor: pointer; transition: all 0.15s;
box-shadow: 0 4px 20px rgba(124,92,252,0.4);
letter-spacing: 0.3px;
}
.btn-publish:hover { box-shadow: 0 6px 24px rgba(124,92,252,0.6); transform: translateY(-1px); }
.btn-publish:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── ADMIN ── */
.admin-btn {
background: rgba(255,255,255,0.07);
border: 1px solid rgba(255,255,255,0.12);
color: #fff; border-radius: 10px;
width: 36px; height: 36px;
font-size: 1rem; cursor: pointer;
transition: background 0.15s;
}
.admin-btn:hover { background: rgba(124,92,252,0.25); }
.admin-btn.active { background: rgba(124,92,252,0.4); border-color: rgba(124,92,252,0.7); }

#adminModal {
position: fixed; inset: 0;
background: rgba(0,0,0,0.75);
backdrop-filter: blur(10px);
z-index: 400;
display: flex; align-items: center; justify-content: center;
padding: 24px;
}

.modal-box {
background: #13131a;
border: 1px solid rgba(124,92,252,0.4);
border-radius: 20px;
padding: 28px 24px;
width: 100%; max-width: 340px;
box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.modal-title {
font-family: ‘Syne’, sans-serif;
font-size: 1.1rem; font-weight: 800;
color: #fff; margin-bottom: 18px; text-align: center;
}

.modal-input {
width: 100%; background: #1a1a24;
border: 1px solid rgba(255,255,255,0.1);
border-radius: 12px; padding: 12px 16px;
font-family: ‘Inter’, sans-serif; font-size: 1rem;
color: #fff; outline: none; margin-bottom: 10px;
caret-color: #7c5cfc;
}
.modal-input:focus { border-color: rgba(124,92,252,0.6); }

.modal-error { color: #fc5c7d; font-size: 0.82rem; margin-bottom: 10px; text-align: center; }

.modal-actions { display: flex; gap: 10px; margin-top: 8px; }

.admin-bar {
max-width: 720px; margin: 0 auto 0;
padding: 10px 20px;
display: none;
align-items: center; justify-content: space-between;
}

.admin-bar.visible { display: flex; }

.admin-bar-label {
font-size: 0.75rem; color: #a78bfa; font-weight: 700;
display: flex; align-items: center; gap: 6px;
}

.btn-logout {
background: transparent; border: 1px solid rgba(252,92,125,0.4);
color: #fc5c7d; border-radius: 8px; padding: 5px 12px;
font-size: 0.75rem; font-weight: 700; cursor: pointer;
font-family: ‘Inter’, sans-serif;
}
.btn-logout:hover { background: rgba(252,92,125,0.1); }

/* ── MOBILE ── */
@media (max-width: 480px) {
.header { padding: 14px 16px; }
.logo { font-size: 1.25rem; }
.upload-section, .gallery-section { padding: 0 12px; }
.upload-section { margin-top: 20px; }
.gallery-section { margin-top: 24px; }
.dropzone { padding: 28px 16px; gap: 8px; }
.dz-icon { width: 48px; height: 48px; font-size: 1.4rem; }
.dz-label { font-size: 0.9rem; }
.dz-btn { padding: 10px 20px; font-size: 0.85rem; }
.camera-row { padding: 12px 16px 16px; gap: 8px; }
.camera-btn { padding: 11px 18px; font-size: 0.88rem; }
.preview-card { border-radius: 14px; }
.preview-thumbs.single .preview-thumb { max-height: 240px; }
.preview-caption-row { padding: 12px 14px; }
.preview-actions { padding: 12px 14px; gap: 8px; }
.btn-cancel, .btn-publish { padding: 13px 10px; font-size: 0.88rem; border-radius: 12px; }
.post-header { padding: 12px 14px; }
.post-caption { font-size: 0.85rem; }
.post-filename { padding: 8px 14px; font-size: 0.7rem; }
.post-img { max-height: 400px; }
.icon-btn { width: 38px; height: 38px; font-size: 1rem; }
.gallery-header { flex-wrap: wrap; gap: 10px; }
.btn-zip { padding: 8px 14px; font-size: 0.8rem; }
.modal-box { padding: 22px 18px; }
.admin-bar { padding: 8px 16px; }
#grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.section-label { font-size: 0.62rem; }
}

</style>
</head>
<body>

<!-- HEADER -->

<header class="header">
  <div class="logo">3T Galileo</div>
  <div class="header-right">
    <div class="pill" id="countPill"><strong id="photoCount">0</strong> foto</div>
    <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">🔑</button>
  </div>
</header>

<!-- MODAL LOGIN ADMIN -->

<div id="adminModal" style="display:none">
  <div class="modal-box">
    <div class="modal-title">🔐 Accesso Admin</div>
    <input id="adminPwInput" type="password" class="modal-input"
      placeholder="Password..." onkeydown="if(event.key==='Enter')checkAdmin()" />
    <div id="adminError" class="modal-error" style="display:none">❌ Password errata</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAdminModal()">Annulla</button>
      <button class="btn-publish" onclick="checkAdmin()">Accedi</button>
    </div>
  </div>
</div>

<!-- BARRA ADMIN (visibile solo quando loggato) -->

<div class="admin-bar" id="adminBar">
  <div class="admin-bar-label">🛡️ Modalità admin attiva</div>
  <button class="btn-logout" onclick="logoutAdmin()">Esci</button>
</div>

<!-- UPLOAD -->

<div class="upload-section">
  <div class="section-label">Condividi qualcosa</div>

  <!-- STEP 1: Scegli foto (visibile di default) -->

  <div class="upload-card" id="stepPick">
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" multiple accept="image/*" onclick="this.value=''" />
      <div class="dz-icon" id="dzIcon">🖼️</div>
      <div class="dz-label" id="dzLabel">Scegli dalla libreria</div>
      <div class="dz-sub">Clicca per aprire le foto</div>
      <button class="dz-btn">Sfoglia foto</button>
    </div>
    <div class="camera-row">
      <span class="camera-label">oppure</span>
      <button class="camera-btn" onclick="document.getElementById('cameraInput').click()">
        📷 Scatta una foto
      </button>
      <input type="file" id="cameraInput" accept="image/*" capture="environment"
        style="display:none" onclick="this.value=''" />
    </div>
  </div>

  <!-- STEP 2: Anteprima + commento (nascosto finché non scegli) -->

  <div class="preview-card" id="stepPreview" style="display:none">
    <!-- Griglia anteprime -->
    <div class="preview-thumbs" id="previewThumbs"></div>
    <!-- Input commento -->
    <div class="preview-caption-row">
      <div class="caption-avatar">💬</div>
      <input id="captionInput" type="text" maxlength="120" class="preview-caption-input"
        placeholder="Aggiungi un commento... (facoltativo)" />
    </div>
    <!-- Azioni -->
    <div class="preview-actions">
      <button class="btn-cancel" onclick="resetUpload()">✕ Annulla</button>
      <button class="btn-publish" id="btnPublish" onclick="publishPhotos()">
        🚀 Pubblica
      </button>
    </div>
  </div>
</div>

<!-- PROGRESS -->

<div class="progress-wrap" id="progressWrap">
  <div class="progress-card">
    <div class="progress-label">
      <span id="progressLabel">Caricamento in corso...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
</div>

<!-- GALLERY -->

<div class="gallery-section">
  <div class="gallery-header">
    <div class="section-label" style="margin-bottom:0">La galleria della classe</div>
    <div class="gallery-header-right" id="galleryControls" style="display:none">
      <div class="view-toggle">
        <button class="vt-btn active" id="btnFeed" onclick="setView('feed')">☰</button>
        <button class="vt-btn" id="btnGrid" onclick="setView('grid')">▦</button>
      </div>
      <button class="btn-zip" id="btnZip" onclick="dlAll()">⬇️ Scarica tutto</button>
    </div>
  </div>
  <div id="loadingState">
    <div class="spinner-ring"></div>
    <span>Connessione a Firebase...</span>
  </div>
  <div id="emptyState" class="empty" style="display:none">
    <div class="empty-icon">🌌</div>
    <div class="empty-title">Nessuna foto ancora</div>
    <div class="empty-sub">Sii il primo a condividere qualcosa!</div>
  </div>
  <div id="feed" class="hidden"></div>
  <div id="grid" class="hidden"></div>
</div>

<!-- LIGHTBOX -->

<div id="lightbox" onclick="closeLightbox(event)">
  <button id="lbClose" onclick="closeLightbox()">✕</button>
  <img id="lbImg" src="" alt="" />
  <div id="lbCaption"></div>
</div>

<!-- TOAST -->

<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════
     FIREBASE — SDK compat (funziona con tag script)
════════════════════════════════════════════════════ -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
// ─── FIREBASE CONFIG ────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyC92cyoD2ajXVA83opnuDGIDMjNMZkZnTA",
  authDomain:        "t-galileo.firebaseapp.com",
  projectId:         "t-galileo",
  storageBucket:     "t-galileo.firebasestorage.app",
  messagingSenderId: "535697851728",
  appId:             "1:535697851728:web:7ebc3432a710243d849855"
};

firebase.initializeApp(firebaseConfig);
const db      = firebase.firestore();
const storage = firebase.storage();
const COL     = "foto3tgalileo";
const FOLDER  = "foto3tgalileo";

// ─── STATO ──────────────────────────────────────────
let photos      = [];
let currentView = "feed";
let pendingFiles = [];

// ─── ADMIN ──────────────────────────────────────────
const ADMIN_HASH = "b3e4a8f1c2d9e7b0a5f3c6d8e2b1a4f7c9d0e3b6a2f5c8d1e4b7a0f3c6d9e2b5"; // hash della password

let isAdmin = sessionStorage.getItem("3tg_admin") === "1";
// Password codificata (non in chiaro): atob(...) = "pornhub1230"
const _ap = atob("cG9ybmh1YjEyMzA=");

function toggleAdmin() {
  if (isAdmin) { logoutAdmin(); return; }
  document.getElementById("adminModal").style.display = "flex";
  setTimeout(() => document.getElementById("adminPwInput").focus(), 200);
}

function checkAdmin() {
  const pw = document.getElementById("adminPwInput").value;
  if (pw === _ap) {
    isAdmin = true;
    sessionStorage.setItem("3tg_admin", "1");
    closeAdminModal();
    updateAdminUI();
    render();
    toast("✅ Benvenuto admin!");
  } else {
    document.getElementById("adminError").style.display = "block";
    document.getElementById("adminPwInput").value = "";
    document.getElementById("adminPwInput").focus();
  }
}

function logoutAdmin() {
  isAdmin = false;
  sessionStorage.removeItem("3tg_admin");
  updateAdminUI();
  render();
  toast("👋 Uscito dalla modalità admin");
}

function closeAdminModal() {
  document.getElementById("adminModal").style.display = "none";
  document.getElementById("adminPwInput").value = "";
  document.getElementById("adminError").style.display = "none";
}

function updateAdminUI() {
  document.getElementById("adminBtn").classList.toggle("active", isAdmin);
  document.getElementById("adminBar").classList.toggle("visible", isAdmin);
}
let toastTimer;
function toast(msg, duration) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = "none"; }, duration || 3000);
}

// ─── FIRESTORE REALTIME ─────────────────────────────
// Timeout: se non risponde in 6s nasconde lo spinner
const loadingTimeout = setTimeout(() => {
  document.getElementById("loadingState").style.display = "none";
  document.getElementById("emptyState").style.display  = "block";
}, 6000);

db.collection(COL).orderBy("ts", "desc").limit(30).onSnapshot(
  snapshot => {
    clearTimeout(loadingTimeout);
    photos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    document.getElementById("loadingState").style.display = "none";
    render();
  },
  err => {
    clearTimeout(loadingTimeout);
    document.getElementById("loadingState").innerHTML =
      '<span style="color:#fc5c7d;font-size:0.9rem">❌ Errore Firebase — ricarica la pagina</span>';
  }
);

// ─── PREVIEW (step 1) ───────────────────────────────
function showPreview(files) {
  const valid = Array.from(files).filter(f => f.type.startsWith("image/"));
  if (!valid.length) { toast("⚠️ Scegli almeno un'immagine"); return; }
  pendingFiles = valid;

  const thumbs = document.getElementById("previewThumbs");
  thumbs.innerHTML = "";
  thumbs.className = "preview-thumbs" + (valid.length === 1 ? " single" : "");
  valid.forEach(file => {
    const img = document.createElement("img");
    img.className = "preview-thumb";
    img.src = URL.createObjectURL(file);
    thumbs.appendChild(img);
  });

  document.getElementById("stepPick").style.display    = "none";
  document.getElementById("stepPreview").style.display = "block";
  // Su iOS, focus su input testo causa lo scroll — meglio non forzarlo
}

// ─── ANNULLA ────────────────────────────────────────
function resetUpload() {
  // Libera object URLs prima di svuotare
  document.querySelectorAll(".preview-thumb").forEach(img => {
    URL.revokeObjectURL(img.src);
  });
  pendingFiles = [];
  document.getElementById("stepPreview").style.display = "none";
  document.getElementById("stepPick").style.display    = "block";
  document.getElementById("captionInput").value        = "";
  const btn = document.getElementById("btnPublish");
  btn.disabled    = false;
  btn.textContent = "🚀 Pubblica";
  document.getElementById("fileInput").value   = "";
  document.getElementById("cameraInput").value = "";
  showProgress(false);
}

// ─── COMPRIMI IMMAGINE (canvas) ─────────────────────
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Lettura file fallita"));
    reader.onload = e => {
      const img = new Image();
      img.onerror = () => reject(new Error("Immagine non valida"));
      img.onload = () => {
        const MAX = 1200;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── PUBBLICA (step 2) ──────────────────────────────
async function publishPhotos() {
  const filesToUpload = [...pendingFiles];
  if (!filesToUpload.length) { toast("⚠️ Nessuna foto selezionata"); return; }

  const btn = document.getElementById("btnPublish");
  btn.disabled    = true;
  btn.textContent = "⏳ Caricamento...";
  const captionText = document.getElementById("captionInput").value.trim();
  showProgress(true);
  let uploaded = 0;

  try {
    for (let i = 0; i < filesToUpload.length; i++) {
      const file = filesToUpload[i];
      setProgress(20, `Compressione foto ${i+1}/${filesToUpload.length}...`);

      // 1. Comprimi nel browser via canvas (niente Storage, niente CORS)
      const dataUrl = await compressImage(file);
      setProgress(70, "Salvataggio su Firestore...");

      // 2. Salva base64 direttamente in Firestore
      await db.collection(COL).add({
        name:    file.name || ("foto_" + Date.now() + ".jpg"),
        caption: captionText || null,
        url:     dataUrl,
        ts:      firebase.firestore.FieldValue.serverTimestamp()
      });

      uploaded++;
      setProgress(100, "✅ Pubblicata!");
    }

    // Ricarica gallery subito
    const snap = await db.collection(COL).orderBy("ts", "desc").limit(30).get();
    photos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render();
    toast("✅ " + uploaded + (uploaded === 1 ? " foto pubblicata!" : " foto pubblicate!"));

  } catch (err) {
    console.error(err);
    toast("❌ Errore: " + (err.message || "riprova"), 8000);
  } finally {
    resetUpload();
  }
}

// ─── ELIMINA ────────────────────────────────────────
async function confirmDelete(id) {
  if (!confirm("Eliminare questa foto?")) return;
  try {
    await db.collection(COL).doc(id).delete();
    photos = photos.filter(p => p.id !== id);
    render();
    toast("🗑️ Foto eliminata");
  } catch (err) {
    toast("❌ Errore: " + err.message);
  }
}

// ─── FILE INPUT / DRAG DROP ─────────────────────────
const dz = document.getElementById("dropzone");
const fi = document.getElementById("fileInput");
const ci = document.getElementById("cameraInput");

dz.addEventListener("dragover",  e => { e.preventDefault(); dz.classList.add("drag"); });
dz.addEventListener("dragleave", () => dz.classList.remove("drag"));
dz.addEventListener("drop", e => {
  e.preventDefault(); dz.classList.remove("drag");
  showPreview(e.dataTransfer.files);
});

fi.addEventListener("change", e => {
  if (e.target.files && e.target.files.length > 0) showPreview(e.target.files);
});
ci.addEventListener("change", e => {
  if (e.target.files && e.target.files.length > 0) showPreview(e.target.files);
});

// ─── PROGRESS BAR ───────────────────────────────────
function showProgress(v) {
  document.getElementById("progressWrap").style.display = v ? "block" : "none";
}
function setProgress(p, label) {
  document.getElementById("progressFill").style.width   = p + "%";
  document.getElementById("progressPct").textContent    = p + "%";
  if (label) document.getElementById("progressLabel").textContent = label;
}

// ─── VIEW TOGGLE ────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById("feed").classList.toggle("hidden", v !== "feed");
  document.getElementById("grid").classList.toggle("hidden", v !== "grid");
  document.getElementById("btnFeed").classList.toggle("active", v === "feed");
  document.getElementById("btnGrid").classList.toggle("active", v === "grid");
}

// ─── RENDER ─────────────────────────────────────────
function timeAgo(ts) {
  if (!ts) return "adesso";
  const d = Date.now() - ts.toMillis();
  if (d < 60000)    return "adesso";
  if (d < 3600000)  return Math.floor(d / 60000) + " min fa";
  if (d < 86400000) return Math.floor(d / 3600000) + " ore fa";
  return Math.floor(d / 86400000) + " giorni fa";
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function render() {
  const empty    = document.getElementById("emptyState");
  const controls = document.getElementById("galleryControls");
  const feedEl   = document.getElementById("feed");
  const gridEl   = document.getElementById("grid");

  document.getElementById("photoCount").textContent = photos.length;
  document.getElementById("countPill").style.display = "flex";

  empty.style.display    = photos.length ? "none" : "block";
  controls.style.display = photos.length ? "flex" : "none";

  feedEl.classList.toggle("hidden", currentView !== "feed");
  gridEl.classList.toggle("hidden", currentView !== "grid");

  feedEl.innerHTML = photos.map(p => `
    <div class="post-card">
      <div class="post-header">
        <div class="post-meta">
          <div class="post-avatar">📸</div>
          <div>
            <div class="post-caption">${esc(p.caption || "Nessuna descrizione")}</div>
            <div class="post-time">${timeAgo(p.ts)}</div>
          </div>
        </div>
        <div class="post-actions">
          <button class="icon-btn" onclick="dlSingle('${p.id}')">⬇️</button>
          ${isAdmin ? `<button class="icon-btn del" onclick="confirmDelete('${p.id}')">🗑️</button>` : ""}
        </div>
      </div>
      <img class="post-img" src="${esc(p.url)}" loading="lazy" onclick="openLightbox('${p.id}')" />
      <div class="post-filename">📎 ${esc(p.name)}</div>
    </div>
  `).join("");

  gridEl.innerHTML = photos.map(p => `
    <div class="grid-card" onclick="openLightbox('${p.id}')">
      <img src="${esc(p.url)}" loading="lazy" />
      <div class="grid-overlay">
        ${p.caption ? `<div class="grid-caption">${esc(p.caption)}</div>` : ""}
      </div>
      ${isAdmin ? `
      <div class="grid-btns" onclick="event.stopPropagation()">
        <button class="mini-btn" onclick="dlSingle('${p.id}')">⬇️</button>
        <button class="mini-btn del" onclick="confirmDelete('${p.id}')">🗑️</button>
      </div>` : ""}
    </div>
  `).join("");
}

// ─── DOWNLOAD SINGOLO ───────────────────────────────
async function dlSingle(id) {
  const p = photos.find(x => x.id === id);
  if (!p) return;
  try {
    const resp = await fetch(p.url);
    const blob = await resp.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = p.name;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch {
    window.open(p.url, "_blank");
  }
}

// ─── DOWNLOAD TUTTO ─────────────────────────────────
async function dlAll() {
  if (!photos.length) return;
  document.getElementById("btnZip").disabled = true;
  toast("📦 Creando ZIP...", 10000);
  try {
    const zip = new JSZip();
    for (const p of photos) {
      const resp = await fetch(p.url);
      const blob = await resp.blob();
      const ext  = blob.type.split("/")[1] || "jpg";
      zip.file(p.name.includes(".") ? p.name : p.name + "." + ext, blob);
    }
    const blob = await zip.generateAsync({ type: "blob" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "foto_3T_Galileo.zip";
    a.click();
    toast("📥 " + photos.length + " foto scaricate!");
  } catch (err) {
    toast("❌ Errore ZIP: " + err.message);
  }
  document.getElementById("btnZip").disabled = false;
}

// ─── LIGHTBOX ───────────────────────────────────────
function openLightbox(id) {
  const p = photos.find(x => x.id === id);
  if (!p) return;
  document.getElementById("lbImg").src = p.url;
  document.getElementById("lbCaption").textContent = p.caption ? '"' + p.caption + '"' : "";
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeLightbox(e) {
  if (e && e.target !== document.getElementById("lightbox") &&
           e.target !== document.getElementById("lbClose")) return;
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lbImg").src = "";
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    closeLightbox({ target: document.getElementById("lightbox") });
    closeAdminModal();
  }
});

// Ripristina stato admin se sessione ancora attiva
updateAdminUI();
</script>

</body>
