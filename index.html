<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3T Galileo</title>

<!-- PWA / Safari home screen -->

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="3T Galileo" />
<meta name="theme-color" content="#0c0c10" />
<link rel="apple-touch-icon" id="appIcon" />

<!-- Genera l'icona 180×180 via canvas al caricamento -->

<script>
(function() {
  const SIZE = 180;
  const c = document.createElement("canvas");
  c.width = c.height = SIZE;
  const ctx = c.getContext("2d");

  // — Sfondo: gradiente viola → rosa —
  const grad = ctx.createLinearGradient(0, 0, SIZE, SIZE);
  grad.addColorStop(0, "#4f2fff");
  grad.addColorStop(1, "#fc5c7d");
  ctx.fillStyle = grad;
  // Angoli arrotondati (r=36)
  const r = 36;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(SIZE - r, 0);
  ctx.quadraticCurveTo(SIZE, 0, SIZE, r);
  ctx.lineTo(SIZE, SIZE - r);
  ctx.quadraticCurveTo(SIZE, SIZE, SIZE - r, SIZE);
  ctx.lineTo(r, SIZE);
  ctx.quadraticCurveTo(0, SIZE, 0, SIZE - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // — Emoji fotocamera piccola in alto —
  ctx.font = "44px serif";
  ctx.textAlign = "center";
  ctx.fillText("📷", SIZE / 2, 72);

  // — Testo "3T" grande e bold —
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 68px -apple-system, Arial, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("3T", SIZE / 2, 128);

  // Assegna come apple-touch-icon
  document.getElementById("appIcon").href = c.toDataURL("image/png");
})();
</script>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080810;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.08);
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --text: #eeeef8;
    --muted: #7070a0;
    --radius: 18px;
  }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Inter’, sans-serif;
min-height: 100vh;
padding-bottom: 80px;
/* Sfondo con blob colorati più visibili */
background-image:
radial-gradient(ellipse 70% 50% at 0% 0%,   rgba(124,92,252,0.25) 0%, transparent 55%),
radial-gradient(ellipse 50% 40% at 100% 100%, rgba(252,92,125,0.20) 0%, transparent 55%),
radial-gradient(ellipse 40% 30% at 50% 50%,  rgba(80,40,180,0.10) 0%, transparent 70%);
}

/* ── HEADER ── */
.header {
display: flex; align-items: center; justify-content: space-between;
padding: 18px 28px;
background: rgba(8,8,16,0.80);
backdrop-filter: blur(20px);
border-bottom: 1px solid rgba(124,92,252,0.25);
/* Lineetta colorata sotto */
box-shadow: 0 1px 0 0 rgba(124,92,252,0.15), 0 4px 24px rgba(0,0,0,0.4);
position: sticky; top: 0; z-index: 100;
}
.logo {
font-family: ‘Syne’, sans-serif; font-size: 1.55rem; font-weight: 800; letter-spacing: -0.5px;
background: linear-gradient(100deg, #c4b5fd 0%, #a78bfa 40%, #fc5c7d 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
filter: drop-shadow(0 0 18px rgba(167,139,250,0.4));
}
.header-right { display: flex; align-items: center; gap: 10px; }
.pill {
background: rgba(124,92,252,0.15);
border: 1px solid rgba(124,92,252,0.35);
color: #c4b5fd;
padding: 5px 14px; border-radius: 99px; font-size: 0.78rem; font-weight: 700;
display: none; letter-spacing: 0.3px;
}
.pill strong { color: #fff; }

/* ── UPLOAD SECTION ── */
.upload-section { max-width: 720px; margin: 36px auto 0; padding: 0 20px; }

.section-label {
display: flex; align-items: center; gap: 8px;
font-size: 0.65rem; font-weight: 700; letter-spacing: 2.5px;
text-transform: uppercase; color: var(–muted); margin-bottom: 14px;
}
.section-label::before {
content: ‘’;
display: inline-block; width: 20px; height: 2px;
background: linear-gradient(90deg, var(–accent), var(–accent2));
border-radius: 2px;
}

/* Card con bordo gradiente */
.upload-card {
position: relative;
border-radius: var(–radius);
overflow: hidden;
background: var(–surface);
/* Bordo gradiente via pseudo-element */
box-shadow:
0 0 0 1px rgba(124,92,252,0.3),
0 8px 32px rgba(0,0,0,0.35),
inset 0 1px 0 rgba(255,255,255,0.05);
}

.caption-row {
display: flex; align-items: center; gap: 12px;
padding: 16px 20px;
border-bottom: 1px solid rgba(124,92,252,0.15);
background: rgba(124,92,252,0.04);
}
.caption-avatar {
width: 38px; height: 38px; border-radius: 50%;
background: linear-gradient(135deg, #6d40ff, #fc5c7d);
flex-shrink: 0; display: flex; align-items: center; justify-content: center;
font-size: 1.1rem;
box-shadow: 0 0 0 3px rgba(124,92,252,0.2), 0 4px 12px rgba(124,92,252,0.3);
}
#captionInput {
flex: 1; background: transparent; border: none; outline: none;
font-family: ‘Inter’, sans-serif; font-size: 0.95rem; color: var(–text);
caret-color: var(–accent);
}
#captionInput::placeholder { color: rgba(112,112,160,0.7); }

.dropzone {
position: relative; display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 12px;
padding: 44px 24px; cursor: pointer; transition: background 0.25s;
/* Bordo tratteggiato colorato */
margin: 16px;
border-radius: 12px;
border: 1.5px dashed rgba(124,92,252,0.35);
background: rgba(124,92,252,0.03);
}
.dropzone:hover, .dropzone.drag {
background: rgba(124,92,252,0.08);
border-color: rgba(124,92,252,0.6);
}
.dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

.dz-icon {
width: 60px; height: 60px; border-radius: 18px;
background: linear-gradient(135deg, rgba(124,92,252,0.2), rgba(252,92,125,0.15));
border: 1px solid rgba(124,92,252,0.3);
display: flex; align-items: center; justify-content: center;
font-size: 1.8rem; transition: transform 0.2s;
pointer-events: none;
box-shadow: 0 4px 16px rgba(124,92,252,0.2);
}
.dropzone:hover .dz-icon, .dropzone.drag .dz-icon { transform: scale(1.1) rotate(-4deg); }

.dz-label { font-size: 1rem; font-weight: 700; color: var(–text); pointer-events: none; }
.dz-sub { font-size: 0.8rem; color: var(–muted); pointer-events: none; }

.dz-btn {
margin-top: 4px;
background: linear-gradient(135deg, #7c5cfc, #a855f7);
color: #fff; border: none; padding: 10px 26px; border-radius: 12px;
font-family: ‘Inter’, sans-serif; font-weight: 700; font-size: 0.88rem;
pointer-events: none;
box-shadow: 0 4px 20px rgba(124,92,252,0.45);
letter-spacing: 0.2px;
}

/* ── PROGRESS ── */
.progress-wrap { max-width: 720px; margin: 14px auto 0; padding: 0 20px; display: none; }
.progress-card {
background: var(–surface);
border: 1px solid rgba(124,92,252,0.25);
border-radius: 14px; padding: 14px 18px;
box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.progress-label { font-size: 0.8rem; color: var(–muted); margin-bottom: 10px; display: flex; justify-content: space-between; }
.progress-track { height: 5px; background: var(–surface2); border-radius: 5px; overflow: hidden; }
.progress-fill {
height: 100%; width: 0%;
background: linear-gradient(90deg, var(–accent), var(–accent2));
border-radius: 5px; transition: width 0.25s;
box-shadow: 0 0 8px rgba(124,92,252,0.5);
}

/* ── GALLERY ── */
.gallery-section { max-width: 720px; margin: 40px auto; padding: 0 20px; }
.gallery-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.gallery-header-right { display: flex; gap: 10px; align-items: center; }

.btn-zip {
display: inline-flex; align-items: center; gap: 7px;
background: rgba(124,92,252,0.12);
border: 1px solid rgba(124,92,252,0.35);
color: #c4b5fd;
padding: 8px 18px; border-radius: 10px; font-family: ‘Inter’, sans-serif;
font-weight: 700; font-size: 0.82rem; cursor: pointer;
transition: all 0.15s;
}
.btn-zip:hover {
background: rgba(124,92,252,0.22);
border-color: rgba(124,92,252,0.6);
box-shadow: 0 0 16px rgba(124,92,252,0.25);
}
.btn-zip:disabled { opacity: 0.35; cursor: not-allowed; }

.view-toggle {
display: flex;
background: var(–surface2);
border: 1px solid rgba(255,255,255,0.08);
border-radius: 10px; overflow: hidden;
}
.vt-btn { padding: 7px 14px; background: transparent; border: none; color: var(–muted); cursor: pointer; font-size: 0.88rem; transition: all 0.15s; }
.vt-btn.active { background: rgba(124,92,252,0.25); color: #c4b5fd; }

/* ── FEED ── */
#feed { display: flex; flex-direction: column; gap: 16px; }
#feed.hidden { display: none; }

.post-card {
background: var(–surface);
border: 1px solid rgba(255,255,255,0.07);
border-radius: var(–radius); overflow: hidden;
transition: border-color 0.2s, box-shadow 0.2s;
box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.post-card:hover {
border-color: rgba(124,92,252,0.4);
box-shadow: 0 8px 32px rgba(124,92,252,0.12);
}
/* Lineetta colorata in cima ad ogni post */
.post-card::before {
content: ‘’;
display: block;
height: 2px;
background: linear-gradient(90deg, var(–accent), var(–accent2));
opacity: 0;
transition: opacity 0.2s;
}
.post-card:hover::before { opacity: 1; }

.post-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; }
.post-meta { display: flex; align-items: center; gap: 12px; }
.post-avatar {
width: 38px; height: 38px; border-radius: 50%;
background: linear-gradient(135deg, #7c5cfc, #fc5c7d);
display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0;
box-shadow: 0 0 0 2px rgba(124,92,252,0.3);
}
.post-caption { font-size: 0.92rem; font-weight: 600; color: var(–text); line-height: 1.35; }
.post-time {
font-size: 0.7rem; color: var(–muted); margin-top: 3px;
display: flex; align-items: center; gap: 4px;
}
.post-time::before { content: ‘🕐’; font-size: 0.65rem; }
.post-actions { display: flex; gap: 6px; }
.icon-btn {
background: var(–surface2); border: 1px solid rgba(255,255,255,0.07); border-radius: 9px;
width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
}
.icon-btn:hover { background: rgba(124,92,252,0.2); border-color: rgba(124,92,252,0.5); transform: scale(1.08); }
.icon-btn.del:hover { background: rgba(252,92,125,0.2); border-color: rgba(252,92,125,0.5); }

.post-img { width: 100%; display: block; max-height: 520px; object-fit: cover; cursor: zoom-in; }
.post-filename {
padding: 10px 18px; font-size: 0.72rem; color: var(–muted);
border-top: 1px solid rgba(255,255,255,0.05);
background: rgba(0,0,0,0.15);
display: flex; align-items: center; gap: 6px;
}
.post-filename::before { content: ‘📎’; font-size: 0.7rem; }

/* ── GRID ── */
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
#grid.hidden { display: none; }
.grid-card {
aspect-ratio: 1; border-radius: 14px; overflow: hidden; position: relative;
cursor: zoom-in; background: var(–surface);
border: 1px solid rgba(255,255,255,0.07);
transition: transform 0.2s, box-shadow 0.2s;
}
.grid-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(124,92,252,0.2); }
.grid-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s; }
.grid-card:hover img { transform: scale(1.06); }
.grid-overlay {
position: absolute; inset: 0;
background: linear-gradient(to top, rgba(10,5,30,0.85) 0%, transparent 55%);
opacity: 0; transition: opacity 0.25s;
display: flex; align-items: flex-end; padding: 12px; pointer-events: none;
}
.grid-card:hover .grid-overlay { opacity: 1; }
.grid-caption { font-size: 0.76rem; font-weight: 600; color: #fff; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
.grid-btns { position: absolute; top: 8px; right: 8px; display: flex; gap: 5px; opacity: 0; transition: opacity 0.2s; }
.grid-card:hover .grid-btns { opacity: 1; }
.mini-btn {
width: 30px; height: 30px; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
display: flex; align-items: center; justify-content: center;
font-size: 0.78rem; cursor: pointer; color: #fff; transition: background 0.15s;
}
.mini-btn:hover { background: rgba(124,92,252,0.75); border-color: rgba(124,92,252,0.5); }
.mini-btn.del:hover { background: rgba(252,92,125,0.75); border-color: rgba(252,92,125,0.5); }

/* ── EMPTY / LOADING ── */
.empty { text-align: center; padding: 80px 20px; }
.empty-icon { font-size: 4rem; margin-bottom: 16px; filter: drop-shadow(0 0 20px rgba(124,92,252,0.3)); }
.empty-title { font-family: ‘Syne’, sans-serif; font-size: 1.2rem; color: var(–muted); }
.empty-sub { font-size: 0.85rem; color: rgba(112,112,160,0.6); margin-top: 6px; }
#loadingState {
text-align: center; padding: 80px 20px; color: var(–muted); font-size: 0.9rem;
display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.spinner-ring {
width: 36px; height: 36px;
border: 3px solid rgba(124,92,252,0.15);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── LIGHTBOX ── */
#lightbox {
display: none; position: fixed; inset: 0; background: rgba(4,4,12,0.95); z-index: 300;
align-items: center; justify-content: center; flex-direction: column;
padding: 24px; backdrop-filter: blur(16px);
}
#lightbox.open { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
#lbImg { max-width: 94vw; max-height: 80vh; border-radius: 14px; object-fit: contain; box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.07); }
#lbCaption { margin-top: 18px; color: rgba(200,200,255,0.65); font-size: 0.9rem; max-width: 500px; text-align: center; font-style: italic; }
#lbClose {
position: fixed; top: 18px; right: 22px;
background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
color: #fff; font-size: 1.1rem; border-radius: 10px;
width: 40px; height: 40px; cursor: pointer;
display: flex; align-items: center; justify-content: center;
backdrop-filter: blur(8px); transition: background 0.15s;
}
#lbClose:hover { background: rgba(252,92,125,0.3); border-color: rgba(252,92,125,0.5); }

/* ── TOAST ── */
#toast {
display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
background: rgba(20,20,32,0.95);
border: 1px solid rgba(124,92,252,0.4);
color: var(–text); padding: 12px 24px; border-radius: 14px;
font-size: 0.88rem; font-weight: 600; z-index: 500;
backdrop-filter: blur(16px); box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,92,252,0.1);
white-space: nowrap; animation: toastIn 0.22s ease;
}
@keyframes toastIn {
from { opacity: 0; transform: translateX(-50%) translateY(10px); }
to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
</style>

</head>

      <input type="file" id="fileInput" multiple accept="image/*" />

<!-- PROGRESS -->

<div class="progress-wrap" id="progressWrap">

      <span id="progressLabel">Caricamento in corso...</span>

<!-- ═══════════════════════════════════════════════════
     FIREBASE — SDK compat (funziona con tag script)
════════════════════════════════════════════════════ -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
// ═══════════════════════════════════════════════════
//  CONFIGURAZIONE FIREBASE
// ═══════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyC92cyoD2ajXVA83opnuDGIDMjNMZkZnTA",
  authDomain:        "t-galileo.firebaseapp.com",
  projectId:         "t-galileo",
  storageBucket:     "t-galileo.firebasestorage.app",
  messagingSenderId: "535697851728",
  appId:             "1:535697851728:web:7ebc3432a710243d849855"
};

firebase.initializeApp(firebaseConfig);

// Shortcut per Firestore e Storage
const db      = firebase.firestore();
const storage = firebase.storage();

// Collection Firestore dove salviamo i metadati
const COL = "foto3tgalileo";

// Cartella in Firebase Storage dove salviamo i file
const FOLDER = "foto3tgalileo";

// ═══════════════════════════════════════════════════
//  STATO LOCALE
// ═══════════════════════════════════════════════════
let photos      = [];   // array di oggetti foto in memoria
let currentView = "feed";

// ═══════════════════════════════════════════════════
//  ASCOLTO IN TEMPO REALE (onSnapshot)
//  Ogni volta che Firestore cambia (upload o delete
//  da qualsiasi browser) questa funzione si richiama
//  automaticamente e aggiorna la galleria.
// ═══════════════════════════════════════════════════
db.collection(COL)
  .orderBy("ts", "desc")
  .onSnapshot(snapshot => {
    photos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render();
    document.getElementById("loadingState").style.display = "none";
  }, err => {
    console.error(err);
    document.getElementById("loadingState").textContent = "❌ Errore connessione Firebase";
  });

// ═══════════════════════════════════════════════════
//  UPLOAD
//  1. Carica il file su Firebase Storage
//  2. Prende l'URL pubblico permanente (downloadURL)
//  3. Salva metadati su Firestore
// ═══════════════════════════════════════════════════
async function handleFiles(files) {
  const valid = Array.from(files).filter(f => f.type.startsWith("image/"));
  if (!valid.length) { toast("⚠️ Solo immagini!"); return; }

  const captionText = document.getElementById("captionInput").value.trim();
  showProgress(true);

  for (let i = 0; i < valid.length; i++) {
    const file = valid[i];

    // Aggiorna barra progresso
    setProgress(Math.round((i / valid.length) * 100),
      `Caricamento ${i + 1} di ${valid.length}...`);

    try {
      // — STEP A: crea un riferimento unico in Storage
      const fileName = `${Date.now()}-${file.name}`;
      const ref = storage.ref(`${FOLDER}/${fileName}`);

      // — STEP B: carica il file con monitoraggio progresso
      const uploadTask = ref.put(file);

      await new Promise((resolve, reject) => {
        uploadTask.on("state_changed",
          snap => {
            // progresso del singolo file
            const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
            setProgress(pct, `Caricamento foto ${i + 1}/${valid.length} — ${pct}%`);
          },
          reject,
          resolve
        );
      });

      // — STEP C: prendi l'URL pubblico permanente
      const downloadURL = await ref.getDownloadURL();

      // — STEP D: salva i metadati su Firestore
      await db.collection(COL).add({
        name:        file.name,
        caption:     captionText || null,
        url:         downloadURL,   // URL permanente dell'immagine
        storagePath: `${FOLDER}/${fileName}`, // serve per cancellare
        ts:          firebase.firestore.FieldValue.serverTimestamp()
      });

    } catch (err) {
      console.error(err);
      toast("❌ Errore upload: " + file.name);
    }
  }

  setProgress(100, "Completato!");
  setTimeout(() => {
    showProgress(false);
    document.getElementById("captionInput").value = "";
    toast(`✅ ${valid.length} foto caricata${valid.length > 1 ? "e" : ""}!`);
  }, 600);
}

// ═══════════════════════════════════════════════════
//  ELIMINA
//  1. Cancella il file da Firebase Storage
//  2. Cancella il documento da Firestore
// ═══════════════════════════════════════════════════
async function confirmDelete(id) {
  if (!confirm("Eliminare questa foto?")) return;
  const photo = photos.find(p => p.id === id);
  if (!photo) return;
  try {
    // Cancella da Storage (se abbiamo il path)
    if (photo.storagePath) {
      await storage.ref(photo.storagePath).delete();
    }
    // Cancella da Firestore
    await db.collection(COL).doc(id).delete();
    toast("🗑️ Foto eliminata");
  } catch (err) {
    console.error(err);
    toast("❌ Errore eliminazione");
  }
}

// ═══════════════════════════════════════════════════
//  DRAG & DROP
// ═══════════════════════════════════════════════════
const dz = document.getElementById("dropzone");
const fi = document.getElementById("fileInput");

dz.addEventListener("dragover", e => {
  e.preventDefault();
  dz.classList.add("drag");
  document.getElementById("dzIcon").textContent = "📂";
  document.getElementById("dzLabel").textContent = "Lascia le foto qui!";
});
dz.addEventListener("dragleave", () => {
  dz.classList.remove("drag");
  document.getElementById("dzIcon").textContent = "🖼️";
  document.getElementById("dzLabel").textContent = "Carica le tue foto";
});
dz.addEventListener("drop", e => {
  e.preventDefault();
  dz.classList.remove("drag");
  document.getElementById("dzIcon").textContent = "🖼️";
  document.getElementById("dzLabel").textContent = "Carica le tue foto";
  handleFiles(e.dataTransfer.files);
});
fi.addEventListener("change", () => handleFiles(fi.files));

// ═══════════════════════════════════════════════════
//  PROGRESSO
// ═══════════════════════════════════════════════════
function showProgress(v) {
  document.getElementById("progressWrap").style.display = v ? "block" : "none";
}
function setProgress(p, label) {
  document.getElementById("progressFill").style.width = p + "%";
  document.getElementById("progressPct").textContent = p + "%";
  if (label) document.getElementById("progressLabel").textContent = label;
}

// ═══════════════════════════════════════════════════
//  RENDER  (ricostruisce feed e griglia)
// ═══════════════════════════════════════════════════
function timeAgo(ts) {
  if (!ts) return "adesso";
  const d = Date.now() - ts.toMillis();
  if (d < 60000)    return "adesso";
  if (d < 3600000)  return Math.floor(d / 60000) + " min fa";
  if (d < 86400000) return Math.floor(d / 3600000) + " ore fa";
  return Math.floor(d / 86400000) + " giorni fa";
}

function esc(str) {
  return String(str || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function render() {
  const pill     = document.getElementById("countPill");
  const empty    = document.getElementById("emptyState");
  const controls = document.getElementById("galleryControls");
  const feedEl   = document.getElementById("feed");
  const gridEl   = document.getElementById("grid");

  document.getElementById("photoCount").textContent = photos.length;
  pill.style.display     = "flex";
  empty.style.display    = photos.length ? "none" : "block";
  controls.style.display = photos.length ? "flex" : "none";
  feedEl.classList.toggle("hidden", currentView !== "feed");
  gridEl.classList.toggle("hidden", currentView !== "grid");

  // — FEED —
  feedEl.innerHTML = photos.map(p => `
    <div class="post-card">
      <div class="post-header">
        <div class="post-meta">
          <div class="post-avatar">📸</div>
          <div>
            <div class="post-caption">${esc(p.caption || "Nessuna descrizione")}</div>
            <div class="post-time">${timeAgo(p.ts)}</div>
          </div>
        </div>
        <div class="post-actions">
          <button class="icon-btn" title="Scarica" onclick="dlSingle('${p.id}')">⬇️</button>
          <button class="icon-btn del" title="Elimina" onclick="confirmDelete('${p.id}')">🗑️</button>
        </div>
      </div>
      <img class="post-img" src="${esc(p.url)}" alt="" loading="lazy"
           onclick="openLightbox('${p.id}')" />
      <div class="post-filename">${esc(p.name)}</div>
    </div>
  `).join("");

  // — GRID —
  gridEl.innerHTML = photos.map(p => `
    <div class="grid-card" onclick="openLightbox('${p.id}')">
      <img src="${esc(p.url)}" alt="" loading="lazy" />
      <div class="grid-overlay">
        ${p.caption ? `<div class="grid-caption">${esc(p.caption)}</div>` : ""}
      </div>
      <div class="grid-btns" onclick="event.stopPropagation()">
        <button class="mini-btn" onclick="dlSingle('${p.id}')">⬇️</button>
        <button class="mini-btn del" onclick="confirmDelete('${p.id}')">🗑️</button>
      </div>
    </div>
  `).join("");
}

// ═══════════════════════════════════════════════════
//  VISTA TOGGLE
// ═══════════════════════════════════════════════════
function setView(v) {
  currentView = v;
  document.getElementById("feed").classList.toggle("hidden", v !== "feed");
  document.getElementById("grid").classList.toggle("hidden", v !== "grid");
  document.getElementById("btnFeed").classList.toggle("active", v === "feed");
  document.getElementById("btnGrid").classList.toggle("active", v === "grid");
}

// ═══════════════════════════════════════════════════
//  DOWNLOAD SINGOLO
//  Usa fetch per scaricare il file come blob,
//  poi lo forza come download (evita apertura nel browser)
// ═══════════════════════════════════════════════════
async function dlSingle(id) {
  const p = photos.find(x => x.id === id);
  if (!p) return;
  try {
    const resp = await fetch(p.url);
    const blob = await resp.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = p.name;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch {
    // fallback: apri in nuova tab
    window.open(p.url, "_blank");
  }
}

// ═══════════════════════════════════════════════════
//  DOWNLOAD TUTTO (ZIP)
//  Scarica ogni immagine dall'URL Firebase Storage,
//  la impacchetta in uno ZIP con JSZip
// ═══════════════════════════════════════════════════
async function dlAll() {
  if (!photos.length) return;
  document.getElementById("btnZip").disabled = true;
  toast("📦 Creando ZIP...");
  try {
    const zip = new JSZip();
    for (const p of photos) {
      const resp = await fetch(p.url);
      const blob = await resp.blob();
      const ext  = blob.type.split("/")[1] || "jpg";
      const name = p.name.includes(".") ? p.name : `${p.name}.${ext}`;
      zip.file(name, blob);
    }
    const blob = await zip.generateAsync({ type: "blob" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "foto_3T_Galileo.zip";
    a.click();
    toast(`📥 ${photos.length} foto scaricate!`);
  } catch (err) {
    console.error(err);
    toast("❌ Errore ZIP");
  }
  document.getElementById("btnZip").disabled = false;
}

// ═══════════════════════════════════════════════════
//  LIGHTBOX
// ═══════════════════════════════════════════════════
function openLightbox(id) {
  const p = photos.find(x => x.id === id);
  if (!p) return;
  document.getElementById("lbImg").src = p.url;
  document.getElementById("lbCaption").textContent = p.caption ? `"${p.caption}"` : "";
  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeLightbox(e) {
  if (e && e.target !== document.getElementById("lightbox") &&
           e.target !== document.getElementById("lbClose")) return;
  document.getElementById("lightbox").classList.remove("open");
  document.getElementById("lbImg").src = "";
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => {
  if (e.key === "Escape") document.getElementById("lightbox").classList.remove("open");
});

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = "none"; }, 2800);
}
</script>
